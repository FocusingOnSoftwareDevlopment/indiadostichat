<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room - IndiaDostiChat</title>
    <meta name="description" content="Join the #IndiaDostiChat room live.">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    
</head>
<body style="margin: 0; padding: 0; overflow: hidden; background-color: #000;">

    <main style="display: flex; flex-direction: column; height: 100vh; width: 100vw; margin: 0; padding: 0;">
        <!-- The background is applied ONLY to the chat container area, with a 20px padding so it frames the chat -->
        <div class="chat-container" style="height: 100%; width: 100%; padding: 20px; box-sizing: border-box; background: url('assets/images/chat_bg.png') center/cover no-repeat #000;">
            
            <!-- Opacity is removed (solid 1.0) so text is 100% perfectly visible, and we add rounded corners -->
            <div id="chatWrapper" class="chat-frame-wrapper" style="display: block; height: 100%; width: 100%; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                <iframe src="https://kiwiirc.hybridirc.com/?theme=dark#indiaDostiChat" title="IndiaDostiChat Live Chat" style="width: 100%; height: 100%; border: none; display: block;"></iframe>
            </div>

        </div>
    </main>

    <script src="assets/js/main.js"></script>
</body>
</html>
