<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat - IndiaDostiChat</title>
  <link rel="icon" href="assets/logo/logo.png" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="config.js"></script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <header class="site-header" id="siteHeader">
    <a class="brand" href="index.html">
      <img class="logo" data-logo alt="IndiaDostiChat logo" />
      <span data-site-name>IndiaDostiChat</span>
    </a>
    <button class="menu-toggle" aria-label="Open menu">☰</button>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="chat.html">Chat</a>
      <a href="rules.html">Rules</a>
      <a href="about.html">About</a>
      <a href="blog.html">Blog</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="chat-page" id="chatMain">
    <section id="captchaBox" class="captcha-box">
      <h2>Security Check</h2>
      <p>Please complete the reCAPTCHA below to prove you are human and access the chatroom.</p>

      <!-- REPLACE SITE_KEY_HERE WITH YOUR REAL GOOGLE RECAPTCHA SITE KEY -->
      <div style="display: flex; justify-content: center; margin-top: 20px;">
        <div class="g-recaptcha" data-sitekey="SITE_KEY_HERE" data-callback="onCaptchaSuccess"></div>
      </div>
      
    </section>

    <section id="chatBox" class="chat-box hidden">
      <iframe id="kiwiFrame" title="IndiaDostiChat IRC Client" allow="clipboard-read; clipboard-write"></iframe>
    </section>
  </main>

  <footer>
    <p>© <span id="year"></span> <span data-site-name>IndiaDostiChat</span>. All rights reserved.</p>
  </footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/chat.js"></script>
</body>
</html>
